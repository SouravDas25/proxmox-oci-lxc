# Test LXC container from an OCI image
# Usage: pve-oci apply test-lxc.yml

auth:
  profile: default
  node: kiki

containers:
  - vmid: 999
    image: docker.io/library/nginx:alpine
    hostname: test-nginx
    memory: 128
    swap: 128
    cores: 1
    net:
      - name=eth0,bridge=vmbr0,ip=dhcp
    rootfs_size: "8"
    storage: cephfs
    rootfs_storage: pxpool01
    mp: []
    privileged: false
    purge_on_upgrade: false
    environment:
      Apple: "PIE"
